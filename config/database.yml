default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  username: <%= ENV['USER'] %>
  password:
  database: forti_demo_development

test:
  <<: *default
  database: forti_demo_test

production:
  <<: *default
  database: forti_demo_production
  username: forti_demo
  password: <%= ENV["FORTI_DEMO_DATABASE_PASSWORD"] %>
